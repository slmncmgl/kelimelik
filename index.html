<!-- Wordle Game Over Screen'e son tur kelimesini ekleyelim -->
<div id="wordle-game-over-screen" class="hidden max-w-md w-full bg-white/95 backdrop-blur-md p-8 rounded-3xl shadow-2xl text-center border-4 border-summer-sun relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-summer-sun to-summer-coral"></div>
    <h2 class="text-4xl font-extrabold text-gray-800 mb-2 mt-4">Oyun Bitti!</h2>
    <p class="text-gray-500 mb-4">Kelime yarışı tamamlandı.</p>
    
    <!-- 🔥 YENİ: Son turun hedef kelimesi -->
    <div id="wd-final-secret-container" class="bg-blue-50 rounded-xl p-3 mb-4">
        <p class="text-xs font-bold text-blue-500 uppercase tracking-wider">Son Turun Kelimesi</p>
        <p id="wd-final-secret" class="text-3xl font-black text-summer-sea tracking-widest">-----</p>
    </div>
    
    <div class="flex justify-center mb-4">
        <span class="player-name-chip gameover-name-chip">🎮 <span class="gameover-name-text"></span> <button onclick="openRenameModal()" title="Adı değiştir">✏️</button></span>
    </div>
    <p class="hidden gameover-name-hint text-xs text-amber-600 font-semibold mb-4">Devam etmeden önce adını değiştirip kaydet ✏️</p>
    <div class="bg-orange-50 rounded-2xl p-6 mb-6">
        <p class="text-sm font-bold text-orange-400 uppercase tracking-widest mb-1">Toplam Skor</p>
        <p id="wd-final-score" class="text-6xl font-black text-summer-coral">0</p>
    </div>
    <div id="wd-mp-results" class="hidden bg-blue-50 rounded-2xl p-4 mb-6 text-left">
        <p class="text-sm font-bold text-summer-sea uppercase tracking-widest mb-2 text-center">🏆 Bu Oyunun Sonuçları</p>
        <div id="wd-mp-results-list" class="flex flex-col gap-1"></div>
    </div>
    <button onclick="tryReturnToMenuFromGameOver()" class="gameover-menu-btn w-full py-4 bg-summer-sea text-white font-bold text-xl rounded-2xl shadow-lg hover:bg-blue-700 transition-all">Ana Menüye Dön</button>
</div>
