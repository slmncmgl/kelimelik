<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wooden GUI Denemesi</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%, rgba(150,190,90,0.25), transparent 60%),
      linear-gradient(180deg, #2f4a2a 0%, #26381f 35%, #1c2a17 100%);
    overflow: hidden;
  }

  .bark {
    position: fixed;
    top: 0; bottom: 0;
    width: 22vw;
    min-width: 160px;
    max-width: 320px;
    background:
      repeating-linear-gradient(100deg, rgba(0,0,0,0.12) 0 6px, transparent 6px 22px),
      linear-gradient(100deg, #5c4326, #3f2e19 45%, #2c2010 100%);
    opacity: 0.9;
  }
  .bark.left { left: 0; border-radius: 0 40% 40% 0 / 0 50% 50% 0; }
  .bark.right { right: 0; border-radius: 40% 0 0 40% / 50% 0 0 50%; transform: scaleX(-1); }

  .menu {
    position: relative;
    z-index: 2;
    width: min(92vw, 420px);
    text-align: center;
  }

  .title {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    color: #fdf6e3;
    font-size: clamp(28px, 7vw, 40px);
    line-height: 1.05;
    letter-spacing: 0.5px;
    text-shadow:
      2px 2px 0 #2c2010, -2px -2px 0 #2c2010,
      2px -2px 0 #2c2010, -2px 2px 0 #2c2010,
      0 6px 0 rgba(0,0,0,0.35);
    margin: 0 0 2.2rem;
  }

  .planks { display: flex; flex-direction: column; gap: 14px; }

  .plank {
    position: relative;
    padding: 18px 20px;
    border-radius: 10px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(19px, 5vw, 25px);
    color: #fff8ec;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.35), -1px -1px 0 rgba(0,0,0,0.15);
    box-shadow:
      0 6px 0 rgba(0,0,0,0.32),
      0 10px 14px rgba(0,0,0,0.35),
      inset 0 2px 0 rgba(255,255,255,0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .plank::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    background-image:
      repeating-linear-gradient(178deg, rgba(0,0,0,0.10) 0 2px, transparent 2px 14px),
      linear-gradient(15deg, transparent 40%, rgba(0,0,0,0.12) 41%, transparent 43%),
      linear-gradient(-25deg, transparent 65%, rgba(0,0,0,0.10) 66%, transparent 68%);
    opacity: 0.9;
    pointer-events: none;
  }
  .plank span { position: relative; z-index: 1; }

  .plank:hover { transform: translateY(-3px) rotate(0deg) !important; }
  .plank:active { transform: translateY(2px) !important; box-shadow: 0 3px 0 rgba(0,0,0,0.32), 0 4px 8px rgba(0,0,0,0.3); }

  .plank.kelime { background: linear-gradient(180deg, #2fb6a8, #1c8a80); transform: rotate(-1deg); }
  .plank.sayi   { background: linear-gradient(180deg, #7cb342, #558b2f); transform: rotate(0.8deg); }
  .plank.karma  { background: linear-gradient(180deg, #f0a63b, #d9822b); transform: rotate(-0.6deg); }

  .footer-icons {
    display: flex;
    justify-content: space-between;
    margin-top: 2.4rem;
    padding: 0 6px;
  }
  .icon-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 6px 10px rgba(0,0,0,0.3);
  }
  .icon-btn.rules { background: radial-gradient(circle at 35% 30%, #8fd47a, #4f9142); }
  .icon-btn.score { background: radial-gradient(circle at 35% 30%, #ffcf6b, #e0972c); }

  .mushroom {
    position: fixed;
    bottom: -10px;
    font-size: 34px;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.4));
    z-index: 1;
  }
</style>
</head>
<body>

<div class="bark left"></div>
<div class="bark right"></div>
<div class="mushroom" style="left: 8%;">🍄</div>
<div class="mushroom" style="right: 10%; bottom: -6px;">🍄</div>

<div class="menu">
  <h1 class="title">BİR KELİME<br>BİR İŞLEM</h1>

  <div class="planks">
    <button class="plank kelime"><span>📖 KELİME AVI</span></button>
    <button class="plank sayi"><span>🔢 SAYI AVI</span></button>
    <button class="plank karma"><span>🎲 KARMA</span></button>
  </div>

  <div class="footer-icons">
    <div class="icon-btn rules" title="Kurallar">📜</div>
    <div class="icon-btn score" title="Skor Tablosu">🏆</div>
  </div>
</div>

</body>
</html>
